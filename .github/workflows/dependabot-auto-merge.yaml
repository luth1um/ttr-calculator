name: Dependabot auto-merge
on: pull_request

env:
  NODE_VERSION: "26"

permissions: {}

jobs:
  verify-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'luth1um/ttr-calculator'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Verify PR only contains allowed changes
        # Never run the verify script from the PR's own (untrusted) checkout - a PR could
        # otherwise rewrite this script to bypass its own checks. Always execute the trusted
        # version from the base branch instead.
        run: git show "${BASE_SHA}:.github/scripts/verify-dependabot-pr.mjs" | node --input-type=module -
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

  auto-merge:
    needs: verify-pr
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --merge "${{ github.event.pull_request.html_url }}"
