name: CI/CD pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 5 * * 2" # every Tuesday at 5:00 UTC
  workflow_dispatch:

permissions: {}

env:
  HUSKY: 0
  NODE_VERSION: "24"
  BUILD_ARTIFACT_NAME: "ttr-calculator-build-output"
  BUILD_ARTIFACT_FOLDER: "dist/ttr-calculator"
  PLAYWRIGHT_BLOB_REPORT_PREFIX: "playwright-blob-report"
  PLAYWRIGHT_BLOB_REPORT_FOLDER: "blob-report"

jobs:
  # Check linting and formatting
  static-analysis:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Linting
        run: npx oxlint --deny-warnings --format=github

      - name: Check formatting
        run: npm run format:check

  # Build the project
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Clean-up of the output directory for build
        run: npm run clean

      - name: Build the project
        run: npm run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' # build artifact is only needed for deployment
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: ${{ env.BUILD_ARTIFACT_FOLDER }}
          if-no-files-found: "error"
          retention-days: 1

  # Run unit tests
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  # Run end-to-end tests with Playwright
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Clean-up of the test results
        run: npm run clean

      - name: Install browsers and dependencies for Playwright
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: ${{ env.PLAYWRIGHT_BLOB_REPORT_PREFIX }}-${{ matrix.shardIndex }}
          path: ${{ env.PLAYWRIGHT_BLOB_REPORT_FOLDER }}
          retention-days: 1

  # Merge Playwright blob reports into a single report
  merge-playwright-reports:
    needs:
      - e2e
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download Playwright blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          path: ${{ env.PLAYWRIGHT_BLOB_REPORT_FOLDER }}
          pattern: ${{ env.PLAYWRIGHT_BLOB_REPORT_PREFIX }}-*
          merge-multiple: true

      - name: Merge into GitHub report
        run: npx playwright merge-reports --reporter github ${{ env.PLAYWRIGHT_BLOB_REPORT_FOLDER }}

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ${{ env.PLAYWRIGHT_BLOB_REPORT_FOLDER }}

      - name: Upload HTML report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: playwright-html-report-attempt-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 14

  # Deploy to GitHub Pages
  deploy-gh-pages:
    needs:
      - static-analysis
      - build
      - test
      - e2e
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: deploy_gh_pages
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: ${{ env.BUILD_ARTIFACT_FOLDER }}

      - name: List downloaded artifact files
        run: |
          echo "Contents of ${{ env.BUILD_ARTIFACT_FOLDER }}:"
          ls -R "${{ env.BUILD_ARTIFACT_FOLDER }}"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f #v4.8.0
        with:
          folder: ${{ env.BUILD_ARTIFACT_FOLDER }}

  # Deploy to Cloudflare Pages
  deploy-cf-pages:
    needs:
      - static-analysis
      - build
      - test
      - e2e
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: deploy_cf_pages
    env:
      HOOK_ID: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_ID }}
    steps:
      - name: Trigger deployment to Cloudflare Pages
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -d "" "https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/${HOOK_ID}")
          echo "HTTP response status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Deployment trigger failed!"
            exit 1
          fi
