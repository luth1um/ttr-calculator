<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTR Calculator</title>
    <style>
      /* ---------- Reset & Base ---------- */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      :root {
        --color-bg: #1a1a2e;
        --color-surface: #16213e;
        --color-card: #0f3460;
        --color-accent: #c91e46;
        --color-accent-hover: #a8193a;
        --color-text: #e0e0e0;
        --color-text-muted: #9e9e9e;
        --color-border: #2a3a5c;
        --color-input-bg: #1e2d4a;
        --color-stale: rgba(233, 69, 96, 0.15);
        --color-stale-border: rgba(233, 69, 96, 0.5);
        --radius: 8px;
        --min-touch: 44px;
        --font: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        font-family: var(--font);
        background: var(--color-bg);
        color: var(--color-text);
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      /* ---------- Accessibility ---------- */
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      :focus-visible {
        outline: 3px solid var(--color-accent);
        outline-offset: 2px;
      }

      /* ---------- Layout ---------- */
      header {
        background: var(--color-surface);
        border-bottom: 1px solid var(--color-border);
        padding: 1rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      header h1 {
        margin: 0;
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--color-text);
      }

      main {
        flex: 1;
        max-width: 680px;
        width: 100%;
        margin: 0 auto;
        padding: 1.5rem 1rem 2rem;
      }

      footer {
        text-align: center;
        padding: 1rem;
        font-size: 0.8rem;
        color: var(--color-text-muted);
        border-top: 1px solid var(--color-border);
      }

      /* ---------- Sections ---------- */
      .section {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        padding: 1.25rem;
        margin-bottom: 1rem;
      }

      /* ---------- Own TTR ---------- */
      #own-ttr-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      #own-ttr-group label {
        font-weight: 600;
        font-size: 0.95rem;
      }

      #own-ttr-input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        background: var(--color-input-bg);
        color: var(--color-text);
        font-size: 1rem;
        min-height: var(--min-touch);
      }

      #own-ttr-input:focus-visible {
        border-color: var(--color-accent);
      }

      /* ---------- Opponent rows ---------- */
      #opponent-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }

      .opponent-row {
        display: grid;
        grid-template-columns: auto 1fr 1fr auto auto;
        align-items: center;
        gap: 0.5rem;
        background: var(--color-card);
        border-radius: var(--radius);
        padding: 0.6rem 0.75rem;
      }

      .opponent-label {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--color-text-muted);
        white-space: nowrap;
        min-width: 6rem;
      }

      .opponent-ttr-group,
      .opponent-select-group {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }

      .opponent-ttr-input,
      .opponent-won-select {
        padding: 0.4rem 0.5rem;
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        background: var(--color-input-bg);
        color: var(--color-text);
        font-size: 0.95rem;
        min-height: var(--min-touch);
        width: 100%;
      }

      .opponent-ttr-input.invalid {
        border-color: var(--color-accent);
      }

      .opponent-won-select:focus-visible {
        border-color: var(--color-accent);
      }

      .win-expectation {
        font-size: 0.9rem;
        font-weight: 700;
        text-align: center;
        min-width: 3rem;
        color: var(--color-text);
      }

      .btn-delete-opponent {
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        color: var(--color-text-muted);
        cursor: pointer;
        min-width: var(--min-touch);
        min-height: var(--min-touch);
        font-size: 1rem;
        transition:
          color 0.15s,
          border-color 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-delete-opponent:hover:not(:disabled) {
        color: var(--color-accent);
        border-color: var(--color-accent);
      }

      .btn-delete-opponent:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* ---------- Buttons ---------- */
      .btn-primary {
        background: var(--color-accent);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        padding: 0.65rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        min-height: var(--min-touch);
        transition: background 0.15s;
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--color-accent-hover);
      }

      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .btn-secondary {
        background: transparent;
        color: var(--color-text-muted);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        padding: 0.65rem 1.25rem;
        font-size: 0.95rem;
        cursor: pointer;
        min-height: var(--min-touch);
        transition:
          color 0.15s,
          border-color 0.15s;
      }

      .btn-secondary:hover {
        color: var(--color-text);
        border-color: var(--color-text-muted);
      }

      #btn-add-opponent {
        width: 100%;
        margin-top: 0.25rem;
      }

      .actions-row {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 1rem;
      }

      #btn-calculate {
        flex: 1;
      }

      /* ---------- Results ---------- */
      #results-summary {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        padding: 1.25rem;
        margin-top: 1rem;
        transition: opacity 0.2s;
      }

      #results-summary.stale {
        background: var(--color-stale);
        border-color: var(--color-stale-border);
      }

      #results-summary.stale .result-value {
        opacity: 0.65;
      }

      .results-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        text-align: center;
      }

      .result-item {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .result-label {
        font-size: 0.8rem;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .result-value {
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--color-text);
      }

      /* ---------- Stale notice ---------- */
      #stale-notice {
        margin-top: 0.75rem;
        font-size: 0.85rem;
        color: var(--color-text);
        text-align: center;
        font-style: italic;
      }

      /* ---------- Dialog ---------- */
      dialog {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        color: var(--color-text);
        padding: 1.75rem;
        max-width: 400px;
        width: 90%;
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(2px);
      }

      dialog h2 {
        margin: 0 0 0.75rem;
        font-size: 1.1rem;
      }

      dialog p {
        margin: 0 0 1.5rem;
        color: var(--color-text-muted);
        line-height: 1.5;
      }

      .dialog-actions {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
      }

      /* ---------- Responsive ---------- */
      @media (max-width: 500px) {
        .opponent-row {
          grid-template-columns: 1fr 1fr;
          grid-template-rows: auto auto;
        }

        .opponent-label {
          grid-column: 1 / -1;
        }

        .win-expectation {
          grid-column: 1 / -1;
          text-align: left;
        }

        .btn-delete-opponent {
          grid-column: 2;
          grid-row: 1;
          justify-self: end;
        }

        .results-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1 id="app-title">TTR Calculator</h1>
        <button id="btn-reset" class="btn-secondary" type="button" aria-haspopup="dialog">Reset</button>
      </header>

      <main>
        <!-- Own TTR -->
        <section class="section" aria-labelledby="own-ttr-heading">
          <div id="own-ttr-group">
            <label for="own-ttr-input">Your TTR</label>
            <input id="own-ttr-input" type="number" min="0" max="3000" placeholder="e.g. 1423" autocomplete="off" />
          </div>
        </section>

        <!-- Opponent list -->
        <section class="section" aria-label="Opponents">
          <div id="opponent-list" aria-label="Opponents"></div>
          <button id="btn-add-opponent" class="btn-secondary" type="button">+ Add Opponent</button>
        </section>

        <!-- Actions -->
        <div class="actions-row">
          <button id="btn-calculate" class="btn-primary" type="button">Calculate</button>
        </div>

        <!-- Results summary -->
        <section id="results-summary" hidden aria-label="Results">
          <div class="results-grid">
            <div class="result-item">
              <span id="result-new-ttr-label" class="result-label">New TTR</span>
              <span id="result-new-ttr" class="result-value" aria-live="polite">—</span>
            </div>
            <div class="result-item">
              <span id="result-delta-label" class="result-label">Delta</span>
              <span id="result-delta" class="result-value" aria-live="polite">—</span>
            </div>
            <div class="result-item">
              <span id="result-expected-wins-label" class="result-label">Expected Wins</span>
              <span id="result-expected-wins" class="result-value" aria-live="polite">—</span>
            </div>
          </div>
          <p id="stale-notice" hidden role="status" aria-live="polite" aria-atomic="true"></p>
        </section>
      </main>

      <footer>
        <p id="footer-text">TTR Calculator</p>
      </footer>
    </div>

    <!-- Reset confirmation dialog -->
    <dialog id="reset-dialog" aria-labelledby="dialog-title" aria-describedby="dialog-message">
      <h2 id="dialog-title">Reset Session</h2>
      <p id="dialog-message">Clear all opponents and start fresh? Your own TTR will be kept.</p>
      <div class="dialog-actions">
        <button id="btn-dialog-cancel" class="btn-secondary" type="button">Cancel</button>
        <button id="btn-dialog-confirm" class="btn-primary" type="button">Confirm</button>
      </div>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
